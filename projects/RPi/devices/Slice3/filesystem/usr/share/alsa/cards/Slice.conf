<confdir:pcm/iec958.conf>

Slice.pcm.iec958.0 {
	@args [ CARD AES0 AES1 AES2 AES3 ]
	@args.CARD {
		type string
	}
	@args.AES0 {
		type integer
	}
	@args.AES1 {
		type integer
	}
	@args.AES2 {
		type integer
	}
	@args.AES3 {
		type integer
	}
	type hooks
	slave.pcm {
		type hw
		card $CARD
		device 0
	}
	hooks.0 {
		type ctl_elems
		hook_args [
		{
			name "DAC Volume"
			lock true
			preserve true
			value [ 0 0 ]
		}
		{
			name "SPDIF Switch"
			lock true
			preserve true
			value on
		}
		]
	}
}
